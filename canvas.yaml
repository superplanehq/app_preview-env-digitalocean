apiVersion: v1
kind: Canvas
metadata:
  description: Spin up preview environments on DigitalOcean for GitHub pull requests
  name: Preview Environments on DigitalOcean
spec:
  edges:
  - channel: default
    sourceId: ack-deploy
    targetId: check-exists
  - channel: default
    sourceId: ack-destroy
    targetId: read-env-destroy
  - channel: found
    sourceId: check-exists
    targetId: already-exists
  - channel: notFound
    sourceId: check-exists
    targetId: create-deployment
  - channel: 'true'
    sourceId: check-ttl
    targetId: ttl-delete-droplet
  - channel: deleted
    sourceId: cleanup-close
    targetId: deploy-status-inactive-close
  - channel: notFound
    sourceId: cleanup-close
    targetId: deploy-status-inactive-close
  - channel: deleted
    sourceId: cleanup-cmd
    targetId: deploy-status-inactive-cmd
  - channel: notFound
    sourceId: cleanup-cmd
    targetId: deploy-status-inactive-cmd
  - channel: default
    sourceId: create-deployment
    targetId: deploy-status-progress
  - channel: default
    sourceId: create-droplet
    targetId: setup-app
  - channel: default
    sourceId: delete-droplet-close
    targetId: cleanup-close
  - channel: default
    sourceId: delete-droplet-cmd
    targetId: cleanup-cmd
  - channel: default
    sourceId: deploy-cmd
    targetId: ack-deploy
  - channel: default
    sourceId: deploy-status-failure
    targetId: setup-failed-comment
  - channel: default
    sourceId: deploy-status-inactive-close
    targetId: comment-destroyed-close
  - channel: default
    sourceId: deploy-status-inactive-cmd
    targetId: comment-destroyed-cmd
  - channel: default
    sourceId: deploy-status-progress
    targetId: create-droplet
  - channel: default
    sourceId: deploy-status-success
    targetId: comment-ready
  - channel: default
    sourceId: destroy-cmd
    targetId: ack-destroy
  - channel: success
    sourceId: http-health-check
    targetId: deploy-status-success
  - channel: failure
    sourceId: http-health-check
    targetId: health-failed-comment
  - channel: default
    sourceId: pr-closed
    targetId: read-env-close
  - channel: default
    sourceId: pr-opened
    targetId: welcome-comment
  - channel: found
    sourceId: read-all-envs
    targetId: check-ttl
  - channel: found
    sourceId: read-env-close
    targetId: delete-droplet-close
  - channel: found
    sourceId: read-env-destroy
    targetId: delete-droplet-cmd
  - channel: notFound
    sourceId: read-env-destroy
    targetId: no-env-destroy
  - channel: default
    sourceId: save-env
    targetId: http-health-check
  - channel: failed
    sourceId: setup-app
    targetId: deploy-status-failure
  - channel: success
    sourceId: setup-app
    targetId: save-env
  - channel: default
    sourceId: setup-failed-comment
    targetId: cleanup-failed-droplet
  - channel: deleted
    sourceId: ttl-cleanup
    targetId: ttl-expired-comment
  - channel: default
    sourceId: ttl-delete-droplet
    targetId: ttl-deploy-status-inactive
  - channel: default
    sourceId: ttl-deploy-status-inactive
    targetId: ttl-cleanup
  - channel: default
    sourceId: ttl-schedule
    targetId: read-all-envs
  - channel: default
    sourceId: console-destroy
    targetId: read-env-destroy
  nodes:
  - component: github.createIssueComment
    configuration:
      body: '## ⏰ Preview Environment Expired


        The preview environment for this PR was automatically destroyed after **24 hours** of inactivity.


        | | |

        |---|---|

        | **Droplet** | `{{ install_params.repository }}-pr-{{ $[''Read All Envs''].data.values[0].pr_number }}` |

        | **Originally requested by** | @{{ $[''Read All Envs''].data.values[0].requested_by }} |


        Run `/start` to spin up a new one.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
      issueNumber: '{{ $[''Read All Envs''].data.values[0].pr_number }}'
      repository: {{ install_params.repository }}
    id: ttl-expired-comment
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: TTL Expired Comment
    position:
      x: 3960
      y: 3020
    type: TYPE_ACTION
  - component: readMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ root().data.pull_request.number }}'
      namespace: preview-envs
      resultMode: latest
    id: read-env-close
    name: Read Env (Close)
    position:
      x: 760
      y: 2560
    type: TYPE_ACTION
  - component: upsertMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ root().data.issue.number }}'
      namespace: preview-envs
      valueList:
      - name: pr_number
        value: '{{ root().data.issue.number }}'
      - name: droplet_id
        value: '{{ string(int($[''Create Droplet''].data.id)) }}'
      - name: url
        value: http://{{ $['Create Droplet'].data.networks.v4[0].ip_address }}.sslip.io
      - name: created_at
        value: '{{ string(int(now().Unix())) }}'
      - name: repo
        value: {{ install_params.repository }}
      - name: deployment_id
        value: '{{ string(int($[''Create Deployment''].data.id)) }}'
      - name: requested_by
        value: '{{ root().data.comment.user.login }}'
      - name: droplet_url
        value: https://cloud.digitalocean.com/droplets/{{ string(int($['Create Droplet'].data.id)) }}
      - name: pr_title
        value: '{{ root().data.issue.title }}'
      - name: pr_url
        value: '{{ root().data.issue.html_url }}'
    id: save-env
    name: Save Environment
    position:
      x: 4600
      y: 740
    type: TYPE_ACTION
  - component: digitalocean.deleteDroplet
    configuration:
      droplet: '{{ int(float($[''Read All Envs''].data.values[0].droplet_id)) }}'
    id: ttl-delete-droplet
    integration:
      id: 505ed7fc-cc70-4226-8ff6-50e3ef601b8d
    metadata:
      dropletId: 0
      dropletName: '{{ int(float($[''Read All Envs''].data.values[0].droplet_id)) }}'
    name: TTL Delete
    position:
      x: 2040
      y: 3020
    type: TYPE_ACTION
  - component: github.createIssueComment
    configuration:
      body: '## 🛩️ Preview Environments


        Use these commands in PR comments:


        | Command | Description |

        |---|---|

        | `/start` | Spin up a preview environment for this PR |

        | `/destroy` | Tear down the preview environment |


        Environments are **automatically destroyed** when the PR is closed or merged.

        Unused environments expire after **24 hours**.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
      issueNumber: '{{ root().data.pull_request.number }}'
      repository: {{ install_params.repository }}
    id: welcome-comment
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Welcome Comment
    position:
      x: 760
      y: 100
    type: TYPE_ACTION
  - component: digitalocean.deleteDroplet
    configuration:
      droplet: '{{ int(float(previous().data.values[0].droplet_id)) }}'
    id: delete-droplet-close
    integration:
      id: 505ed7fc-cc70-4226-8ff6-50e3ef601b8d
    metadata:
      dropletId: 0
      dropletName: '{{ int(float(previous().data.values[0].droplet_id)) }}'
    name: Delete Droplet (Close)
    position:
      x: 1400
      y: 2560
    type: TYPE_ACTION
  - component: deleteMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ $[''Read All Envs''].data.values[0].pr_number }}'
      namespace: preview-envs
    id: ttl-cleanup
    name: TTL Cleanup
    position:
      x: 3320
      y: 3020
    type: TYPE_ACTION
  - component: github.addReaction
    configuration:
      commentId: '{{ root().data.comment.id }}'
      content: eyes
      repository: {{ install_params.repository }}
      target: issueComment
    id: ack-deploy
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Ack Deploy
    position:
      x: 760
      y: 920
    type: TYPE_ACTION
  - component: github.createIssueComment
    configuration:
      body: '⚠️ **Preview already running!**


        🔗 {{ $[''Check Exists''].data.values[0].url }}


        Use `/destroy` first, then `/start` again.'
      issueNumber: '{{ root().data.issue.number }}'
      repository: {{ install_params.repository }}
    id: already-exists
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Already Running
    position:
      x: 2040
      y: 1100
    type: TYPE_ACTION
  - component: start
    configuration:
      templates:
      - name: destroy
        parameters:
        - name: issue_number
          type: string
        payload:
          issue:
            number: '{{ parameters["issue_number"] }}'
    id: console-destroy
    name: 'Console: Destroy'
    position:
      x: 760
      y: 2100
    type: TYPE_TRIGGER
  - component: github.onPRComment
    configuration:
      contentFilter: ^/destroy
      repository: {{ install_params.repository }}
    id: destroy-cmd
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: /destroy
    position:
      x: 120
      y: 1920
    type: TYPE_TRIGGER
  - component: schedule
    configuration:
      hoursInterval: 1
      timezone: '0'
      type: hours
    id: ttl-schedule
    metadata:
      nextTrigger: '2026-05-24T18:00:00Z'
      referenceTime: null
    name: TTL Check
    position:
      x: 120
      y: 3020
    type: TYPE_TRIGGER
  - component: github.addReaction
    configuration:
      commentId: '{{ root().data.comment.id }}'
      content: eyes
      repository: {{ install_params.repository }}
      target: issueComment
    id: ack-destroy
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Ack Destroy
    position:
      x: 760
      y: 1740
    type: TYPE_ACTION
  - component: github.createIssueComment
    configuration:
      body: '## 🚀 Preview Environment Ready


        🔗 **http://{{ $[''Create Droplet''].data.networks.v4[0].ip_address }}.sslip.io**


        | | |

        |---|---|

        | **Droplet** | `{{ install_params.repository }}-pr-{{ root().data.issue.number }}` |

        | **IP** | `{{ $[''Create Droplet''].data.networks.v4[0].ip_address }}` |

        | **Requested by** | @{{ root().data.comment.user.login }} |


        To destroy: `/destroy` · Auto-expires in 24h.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
      issueNumber: '{{ root().data.issue.number }}'
      repository: {{ install_params.repository }}
    id: comment-ready
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Post Preview URL
    position:
      x: 6520
      y: 920
    type: TYPE_ACTION
  - component: github.createIssueComment
    configuration:
      body: '## ❌ Preview Environment Failed


        Setup failed on `{{ install_params.repository }}-pr-{{ root().data.issue.number }}` (`{{ $[''Create Droplet''].data.networks.v4[0].ip_address
        }}`).


        <details>

        <summary>Error details</summary>


        ```

        {{ $[''Setup App''].data.stderr }}

        ```

        </details>


        Droplet will be cleaned up automatically.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
      issueNumber: '{{ root().data.issue.number }}'
      repository: {{ install_params.repository }}
    id: setup-failed-comment
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Setup Failed
    position:
      x: 5240
      y: 1100
    type: TYPE_ACTION
  - component: if
    configuration:
      expression: '{{ int(now().Unix()) - int(previous().data.values[0].created_at) > 86400 }}'
    id: check-ttl
    name: Older than 24h?
    position:
      x: 1400
      y: 3020
    type: TYPE_ACTION
  - component: readMemory
    configuration:
      emitMode: oneByOne
      matchList:
      - name: repo
        value: {{ install_params.repository }}
      namespace: preview-envs
      resultMode: all
    id: read-all-envs
    name: Read All Envs
    position:
      x: 760
      y: 3020
    type: TYPE_ACTION
  - component: github.onPullRequest
    configuration:
      actions:
      - closed
      repository: {{ install_params.repository }}
    id: pr-closed
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: PR Closed
    position:
      x: 120
      y: 2560
    type: TYPE_TRIGGER
  - component: annotation
    configuration:
      color: purple
      height: 328
      text: "## Setting up your app\n\nThis SSH node runs `scripts/preview-setup.sh` from the **Files** tab to install and\
        \ start your application on the droplet.\n\n### Before you start\n\n1. **Create an SSH key** on DigitalOcean and note\
        \ the fingerprint\n2. **Create a secret** in SuperPlane with the private key\n3. **Attach the secret** to this SSH\
        \ component's authentication config\n  \n### You will need to update this\n  \nThis app handles the full lifecycle\
        \ of preview environments — provisioning, health checks, teardown, and cleanup. But the actual setup step depends\
        \ on your application. Edit `scripts/preview-setup.sh` in the **Files** tab to install your dependencies, build your\
        \ app, and start your services."
      width: 600
    id: annotation-note-2iadh0
    name: Note
    position:
      x: 3840
      y: 456
    type: TYPE_WIDGET
  - component: readMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ root().data.issue.number }}'
      namespace: preview-envs
      resultMode: latest
    id: check-exists
    name: Check Exists
    position:
      x: 1400
      y: 920
    type: TYPE_ACTION
  - component: github.createDeploymentStatus
    configuration:
      deploymentId: '{{ $[''Create Deployment''].data.id }}'
      description: Preview environment ready
      environmentUrl: http://{{ $['Create Droplet'].data.networks.v4[0].ip_address }}.sslip.io
      repository: {{ install_params.repository }}
      state: success
    id: deploy-status-success
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: 'Status: Success'
    position:
      x: 5880
      y: 560
    type: TYPE_ACTION
  - component: github.createDeploymentStatus
    configuration:
      deploymentId: '{{ $[''Read Env''].data.values[0].deployment_id }}'
      description: Environment destroyed
      repository: {{ install_params.repository }}
      state: inactive
    id: deploy-status-inactive-cmd
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: 'Status: Inactive'
    position:
      x: 3320
      y: 1920
    type: TYPE_ACTION
  - component: ssh
    configuration:
      authentication:
        authMethod: ssh_key
        privateKey:
          key: private_key
          secret: {{ install_params.ssh_secret }}
      commandFile: scripts/preview-setup.sh
      commandSource: file
      connectionRetry:
        enabled: true
        intervalSeconds: 15
        retries: 10
      environment:
      - name: PR_NUMBER
        value: '{{ root().data.issue.number }}'
      - name: REPO_URL
        value: '{{ root().data.repository.clone_url }}'
      host: '{{ $[''Create Droplet''].data.networks.v4[0].ip_address }}'
      port: 22
      timeout: 300
      username: root
    id: setup-app
    name: Setup App
    position:
      x: 3960
      y: 920
    type: TYPE_ACTION
  - component: http
    configuration:
      method: GET
      retry:
        enabled: false
      timeoutSeconds: 5
      url: http://{{ $['Create Droplet'].data.networks.v4[0].ip_address }}.sslip.io
    id: http-health-check
    name: Health Check
    position:
      x: 5240
      y: 740
    type: TYPE_ACTION
  - component: github.onPullRequest
    configuration:
      actions:
      - opened
      repository: {{ install_params.repository }}
    id: pr-opened
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: PR Opened
    position:
      x: 120
      y: 100
    type: TYPE_TRIGGER
  - component: github.createIssueComment
    configuration:
      body: '## 🧹 Preview Environment Destroyed


        The preview environment has been cleaned up.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
      issueNumber: '{{ root().data.issue.number }}'
      repository: {{ install_params.repository }}
    id: comment-destroyed-cmd
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Destroyed Comment
    position:
      x: 3960
      y: 1920
    type: TYPE_ACTION
  - component: github.createDeploymentStatus
    configuration:
      deploymentId: '{{ $[''Read Env (Close)''].data.values[0].deployment_id }}'
      description: PR closed - environment destroyed
      repository: {{ install_params.repository }}
      state: inactive
    id: deploy-status-inactive-close
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: 'Status: Inactive (Close)'
    position:
      x: 2680
      y: 2560
    type: TYPE_ACTION
  - component: github.createDeployment
    configuration:
      description: 'Preview environment for PR #{{ root().data.issue.number }}'
      environment: preview-pr-{{ root().data.issue.number }}
      ref: refs/pull/{{ root().data.issue.number }}/head
      repository: {{ install_params.repository }}
      transientEnvironment: true
    id: create-deployment
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Create Deployment
    position:
      x: 2040
      y: 740
    type: TYPE_ACTION
  - component: github.createIssueComment
    configuration:
      body: '## 🧹 Preview Environment Destroyed


        The preview environment was automatically cleaned up when the PR was closed.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
      issueNumber: '{{ root().data.pull_request.number }}'
      repository: {{ install_params.repository }}
    id: comment-destroyed-close
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: Destroyed Comment (Close)
    position:
      x: 3320
      y: 2560
    type: TYPE_ACTION
  - component: readMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ root().data.issue.number }}'
      namespace: preview-envs
      resultMode: latest
    id: read-env-destroy
    name: Read Env
    position:
      x: 1400
      y: 1920
    type: TYPE_ACTION
  - component: deleteMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ root().data.pull_request.number }}'
      namespace: preview-envs
    id: cleanup-close
    name: Cleanup Memory (Close)
    position:
      x: 2040
      y: 2560
    type: TYPE_ACTION
  - component: digitalocean.deleteDroplet
    configuration:
      droplet: '{{ int(float(previous().data.values[0].droplet_id)) }}'
    id: delete-droplet-cmd
    integration:
      id: 505ed7fc-cc70-4226-8ff6-50e3ef601b8d
    metadata:
      dropletId: 0
      dropletName: '{{ int(float(previous().data.values[0].droplet_id)) }}'
    name: Delete Droplet
    position:
      x: 2040
      y: 1740
    type: TYPE_ACTION
  - component: github.createDeploymentStatus
    configuration:
      deploymentId: '{{ $[''Create Deployment''].data.id }}'
      description: Setup failed
      repository: {{ install_params.repository }}
      state: failure
    id: deploy-status-failure
    integration:
      id: 51a76317-1481-467b-b761-3bb11af1851e
    metadata:
      repository:
        id: 1165844309
        name: {{ install_params.repository }}
        url: ""
    name: 'Status: Failure'
    position:
      x: 4600
      y: 1100
    type: TYPE_ACTION
  - component: deleteMemory
    configuration:
      matchList:
      - name: pr_number
        value: '{{ root().data.issue.number }}'
      namespace: preview-envs
    id: cleanup-cmd
    name: Cleanup Memory
    position:
      x: 2680
      y: 1920
    type: TYPE_ACTION
  - component: github.createIssueComment
    configuration:
      body: '## ⚠️ Preview Environment Ready (with warnings)


        🔗 **http://{{ $[''Create Droplet''].data.networks.v4[0].ip_address }}.sslip.io**


        Health check failed but the environment was created. The app may still be starting up — try the link in a minute.


        | | |

        |---|---|

        | **Droplet** | `{{ install_params.repository }}-pr-{{ root().data.issue.number }}` |

        | **IP** | `{{ $[''Create Droplet''].data.networks.v4[0].ip_address }}` |


        To destroy: `/destroy` · Auto-expires in 24h.


        ---

        *Powered by [SuperPlane](https://app.superplane.com/3ee1aa47-3a60-4c1f-b645-0b9859ab91f8/canvases/c6a13eb9-7f6c-42c2-b177-b5dfe0b0aeb0)
        🛩️*'
